{% extends "base.html" %}
{% block title %}ContainIQ — Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill display-3 text-primary"></i>
      <h1 class="h3 mt-2 fw-bold">ContainIQ</h1>
      <p class="text-muted">AI-Powered Incident Response Platform</p>
    </div>
    <div class="card ciq-card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" name="remember" class="form-check-input" id="remember"/>
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">
      Default: admin@containiq.local / changeme
    </p>
  </div>
</div>
{% endblock %}
